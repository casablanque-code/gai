name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: gai
  TARGET: x86_64-unknown-linux-musl

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: tag must match Cargo.toml workspace version
        run: bash scripts/check_tag_version.sh "${GITHUB_REF_NAME}" Cargo.toml

  build:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2

      - name: build static release binary
        run: cargo build --release --package gai-inspector --target ${{ env.TARGET }}

      - name: package
        run: |
          cd target/${{ env.TARGET }}/release
          tar czf ${{ github.workspace }}/${{ env.BIN_NAME }}-${{ env.TARGET }}.tar.gz ${{ env.BIN_NAME }}
          cd ${{ github.workspace }}
          sha256sum ${{ env.BIN_NAME }}-${{ env.TARGET }}.tar.gz > ${{ env.BIN_NAME }}-${{ env.TARGET }}.tar.gz.sha256

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BIN_NAME }}-${{ env.TARGET }}.tar.gz
            ${{ env.BIN_NAME }}-${{ env.TARGET }}.tar.gz.sha256
          generate_release_notes: true
