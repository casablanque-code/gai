name: Publish crates

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: tag must match Cargo.toml workspace version
        run: bash scripts/check_tag_version.sh "${GITHUB_REF_NAME}" Cargo.toml

  publish:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Order matters: gai-probe and gai-inspector depend on gai-core by path,
      # and crates.io publish resolves path deps against what's already
      # published there — leaf crate first.
      - name: publish gai-core
        run: cargo publish -p gai-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: wait for index
        run: sleep 30
      - name: publish gai-probe
        run: cargo publish -p gai-probe --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: wait for index
        run: sleep 30
      - name: publish gai-inspector
        run: cargo publish -p gai-inspector --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
